name: Release Desktop App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-mac:
    needs: build-win
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Electron app dependencies
        run: pnpm exec electron-builder install-app-deps

      - name: Build web app
        run: pnpm exec next build --webpack

      - name: Build and publish mac release
        run: pnpm exec electron-builder --mac dmg zip --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-win:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Electron app dependencies
        run: pnpm exec electron-builder install-app-deps

      - name: Build web app
        run: pnpm exec next build --webpack

      - name: Build and publish Windows release
        run: pnpm exec electron-builder --win nsis --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
